[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Scheduling and the /api/data path are declared in-file via `export const config`
# in each function (netlify/functions/*.mts):
#   - fetch-matches: schedule "*/2 * * * *"
#   - fetch-news:    schedule "*/20 * * * *"
#   - get-data:      path "/api/data"

# SPA fallback — leave function/asset routes untouched, send everything else to
# the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
